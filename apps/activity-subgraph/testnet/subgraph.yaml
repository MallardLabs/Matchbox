specVersion: 0.0.5
schema:
  file: ../schema.graphql
dataSources:
  - kind: ethereum
    name: VeBTC
    network: mezo-testnet
    source:
      address: "0x38E35d92E6Bfc6787272A62345856B13eA12130a"
      abi: VotingEscrow
      startBlock: 11739500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LockPosition
      abis:
        - name: VotingEscrow
          file: ../abis/VotingEscrow.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,indexed uint8,uint256,uint256,uint256)
          handler: handleVeBTCDeposit
        - event: LockPermanent(indexed address,indexed uint256,uint256,uint256)
          handler: handleVeBTCLockPermanent
        - event: Merge(indexed address,indexed uint256,indexed uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleVeBTCMerge
        - event: UnlockPermanent(indexed address,indexed uint256,uint256,uint256)
          handler: handleVeBTCUnlockPermanent
        - event: UpdateBoost(indexed uint256,uint256)
          handler: handleVeBTCUpdateBoost
      file: ../src/vebtc.ts
  - kind: ethereum
    name: VeMEZO
    network: mezo-testnet
    source:
      address: "0xaCE816CA2bcc9b12C59799dcC5A959Fb9b98111b"
      abi: VotingEscrow
      startBlock: 11739500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: VotingEscrow
          file: ../abis/VotingEscrow.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,indexed uint8,uint256,uint256,uint256)
          handler: handleVotingEscrowDeposit
        - event: LockPermanent(indexed address,indexed uint256,uint256,uint256)
          handler: handleLockPermanent
        - event: Merge(indexed address,indexed uint256,indexed uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleMerge
        - event: UnlockPermanent(indexed address,indexed uint256,uint256,uint256)
          handler: handleUnlockPermanent
        - event: Withdraw(indexed address,indexed uint256,uint256,uint256)
          handler: handleWithdraw
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: UpdateBoost(indexed uint256,uint256)
          handler: handleUpdateBoost
      file: ../src/voting-escrow.ts
  - kind: ethereum
    name: BoostVoter
    network: mezo-testnet
    source:
      address: "0x21d7bDF5a5929AD179F8cA0c9014A0B62ae6Bfd1"
      abi: BoostVoter
      startBlock: 11739500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: BoostVoter
          file: ../abis/BoostVoter.json
      eventHandlers:
        - event: Abstained(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleBoostAbstained
        - event: GaugeCreated(indexed address,indexed address,indexed address)
          handler: handleBoostGaugeCreated
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleBoostVoted
        - event: BoostPoked(indexed uint256,uint256)
          handler: handleBoostPoked
        - event: BoostableTokenBurned(indexed uint256,indexed address)
          handler: handleBoostableTokenBurned
        - event: BribesAdded(indexed address,indexed address,uint256,address)
          handler: handleBoostBribesAdded
        - event: DistributeReward(indexed address,indexed address,uint256)
          handler: handleBoostDistributeReward
        - event: GaugeKilled(indexed address)
          handler: handleBoostGaugeKilled
        - event: GaugeRevived(indexed address)
          handler: handleBoostGaugeRevived
        - event: NotifyReward(indexed address,indexed address,uint256)
          handler: handleBoostNotifyReward
      file: ../src/boost-voter.ts
  - kind: ethereum
    name: PoolsVoter
    network: mezo-testnet
    source:
      address: "0x263F1Fd5fB7F866881e1B6cD7d5d6c40Fd985F0D"
      abi: PoolsVoter
      startBlock: 11739500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: PoolsVoter
          file: ../abis/PoolsVoter.json
      eventHandlers:
        - event: Abstained(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handlePoolAbstained
        - event: GaugeCreated(indexed address,indexed address,indexed address,address,address,address,address,address)
          handler: handlePoolGaugeCreated
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handlePoolVoted
        - event: DistributeReward(indexed address,indexed address,uint256)
          handler: handlePoolDistributeReward
        - event: GaugeKilled(indexed address)
          handler: handlePoolGaugeKilled
        - event: GaugeRevived(indexed address)
          handler: handlePoolGaugeRevived
        - event: NotifyReward(indexed address,indexed address,uint256)
          handler: handlePoolNotifyReward
      file: ../src/pools-voter.ts
  - kind: ethereum
    name: ValidatorsVoter
    network: mezo-testnet
    source:
      address: "0xac1bA4627d2Ec488bEdd562bB857275C45003844"
      abi: NonPoolsVoter
      startBlock: 11739500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
        - Vote
      abis:
        - name: NonPoolsVoter
          file: ../abis/NonPoolsVoter.json
      eventHandlers:
        - event: Abstained(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleValidatorsAbstained
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleValidatorsVoted
        - event: GaugeCreated(indexed address,indexed address,indexed address)
          handler: handleValidatorsGaugeCreated
        - event: GaugeKilled(indexed address)
          handler: handleValidatorsGaugeKilled
        - event: GaugeRevived(indexed address)
          handler: handleValidatorsGaugeRevived
        - event: BribesAdded(indexed address,indexed address,uint256,address)
          handler: handleValidatorsBribesAdded
        - event: DistributeReward(indexed address,indexed address,uint256)
          handler: handleValidatorsDistributeReward
        - event: NotifyReward(indexed address,indexed address,uint256)
          handler: handleValidatorsNotifyReward
        - event: ValidatorGaugeCreated(indexed address,indexed address,indexed address)
          handler: handleValidatorGaugeCreated
        - event: ValidatorLeft(indexed address,indexed address)
          handler: handleValidatorLeft
      file: ../src/non-pools-voter.ts
templates:
  - kind: ethereum
    name: BribeVotingReward
    network: mezo-testnet
    source:
      abi: BribeVotingReward
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: BribeVotingReward
          file: ../abis/BribeVotingReward.json
      eventHandlers:
        - event: NotifyReward(indexed address,indexed address,indexed uint256,uint256)
          handler: handleBribeNotifyReward
      file: ../src/bribes.ts
