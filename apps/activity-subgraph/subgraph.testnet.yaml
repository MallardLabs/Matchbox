specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: VeMEZO
    network: mezo-testnet
    source:
      address: "0xaCE816CA2bcc9b12C59799dcC5A959Fb9b98111b"
      abi: VotingEscrow
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: VotingEscrow
          file: ./abis/VotingEscrow.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,indexed uint8,uint256,uint256,uint256)
          handler: handleVotingEscrowDeposit
      file: ./src/voting-escrow.ts
  - kind: ethereum
    name: BoostVoter
    network: mezo-testnet
    source:
      address: "0x21d7bDF5a5929AD179F8cA0c9014A0B62ae6Bfd1"
      abi: BoostVoter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: BoostVoter
          file: ./abis/BoostVoter.json
      eventHandlers:
        - event: GaugeCreated(indexed address,indexed address,indexed address)
          handler: handleBoostGaugeCreated
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleBoostVoted
        - event: BoostPoked(indexed uint256,uint256)
          handler: handleBoostPoked
      file: ./src/boost-voter.ts
  - kind: ethereum
    name: PoolsVoter
    network: mezo-testnet
    source:
      address: "0x263F1Fd5fB7F866881e1B6cD7d5d6c40Fd985F0D"
      abi: PoolsVoter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: PoolsVoter
          file: ./abis/PoolsVoter.json
      eventHandlers:
        - event: GaugeCreated(indexed address,indexed address,indexed address,address,address,address,address,address)
          handler: handlePoolGaugeCreated
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handlePoolVoted
      file: ./src/pools-voter.ts
