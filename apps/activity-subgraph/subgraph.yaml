    name: VeMEZO
    network: mezo
    source:
      address: "0xb90fdAd3DFD180458D62Cc6acedc983D78E20122"
      abi: VotingEscrow
      startBlock: 7739500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: VotingEscrow
          file: ./abis/VotingEscrow.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,indexed uint8,uint256,uint256,uint256)
