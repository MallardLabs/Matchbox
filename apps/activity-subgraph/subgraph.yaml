specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: VeMEZO
    network: mezo-mainnet
    source:
      address: "0xb90fdAd3DFD180458D62Cc6acedc983D78E20122"
      abi: VotingEscrow
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: VotingEscrow
          file: ./abis/VotingEscrow.json
      eventHandlers:
        - event: Deposit(indexed address,indexed uint256,indexed uint8,uint256,uint256,uint256)
          handler: handleVotingEscrowDeposit
      file: ./src/voting-escrow.ts
  - kind: ethereum
    name: BoostVoter
    network: mezo-mainnet
    source:
      address: "0x2Ba614a598Cffa5a19d683cDCA97bac3a49313d1"
      abi: BoostVoter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: BoostVoter
          file: ./abis/BoostVoter.json
      eventHandlers:
        - event: GaugeCreated(indexed address,indexed address,indexed address)
          handler: handleBoostGaugeCreated
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleBoostVoted
        - event: BoostPoked(indexed uint256,uint256)
          handler: handleBoostPoked
      file: ./src/boost-voter.ts
  - kind: ethereum
    name: PoolsVoter
    network: mezo-mainnet
    source:
      address: "0x48233cCC97B87Ba93bCA212cbEe48e3210211f03"
      abi: PoolsVoter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ActivityEvent
        - ActivityStats
      abis:
        - name: PoolsVoter
          file: ./abis/PoolsVoter.json
      eventHandlers:
        - event: GaugeCreated(indexed address,indexed address,indexed address,address,address,address,address,address)
          handler: handlePoolGaugeCreated
        - event: Voted(indexed address,indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handlePoolVoted
      file: ./src/pools-voter.ts
