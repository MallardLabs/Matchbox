          handler: handleWithdraw
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: UpdateBoost(indexed uint256,uint256)
          handler: handleUpdateBoost
      file: ./src/voting-escrow.ts
