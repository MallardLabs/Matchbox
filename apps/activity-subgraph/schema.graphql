  epochStart: BigInt!
  voteCount: BigInt!
  incentiveCount: BigInt!
  totalWeight: BigInt!
  totalIncentiveAmount: BigInt!
  lastUpdatedAt: BigInt!
}

type Vote @entity(immutable: false) {
