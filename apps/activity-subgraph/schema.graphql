  LOCK_CREATED
  LOCK_AMOUNT_INCREASED
  LOCK_EXTENDED
  LOCK_WITHDRAWN
  LOCK_PERMANENT
  LOCK_PERMANENT_UNLOCKED
  LOCK_TRANSFERRED
  LOCK_MERGED
  BOOST_VOTE
  BOOST_ABSTAIN
  BOOST_POKE
  PAIR_CREATED
  GAUGE_CREATED
  GAUGE_KILLED
  GAUGE_REVIVED
  BOOSTABLE_TOKEN_BURNED
  INCENTIVE_ADDED
  REWARD_DISTRIBUTED
  REWARD_NOTIFIED
  THIRD_PARTY_GAUGE_CREATED
  VALIDATOR_GAUGE_CREATED
  VALIDATOR_LEFT
  PERIOD_UPDATED
  EPOCH_PROCESSED
  EMISSIONS_ENABLED
  REBASE_CLAIMED
  REBASE_CHECKPOINT
  MERKLE_CLAIMED
  MERKLE_DISTRIBUTION_ADDED
  SAVINGS_DEPOSIT
  SAVINGS_WITHDRAW
  SAVINGS_YIELD_CLAIMED
  PROTOCOL_YIELD_RECEIVED
  STRATEGY_YIELD_RECEIVED
  PCV_DISTRIBUTION
  PCV_DEBT_PAYMENT
